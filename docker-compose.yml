version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: codexa_build
    environment:
      POSTGRES_DB: codexa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - codexa_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  codexa_db_data: